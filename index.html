<div class="left">

<h1>Employee Management System</h1>

<p>

</p>

<form id="loginForm">

id="username"
placeholder="Username"
required>

</div>

<div class="input-box">

<i class="fa fa-lock"></i>

<input
type="password"
id="password"
placeholder="Password"
required>

</div>

<button>

</button>
